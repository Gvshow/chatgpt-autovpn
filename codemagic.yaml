workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    scripts:
      - name: Check project files
        script: |
          pwd
          ls -la
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"
      - name: Build APK
        script: |
          gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
